name: Build Print Station (Windows)

# Builds the Vista Print Station desktop app into a Windows .exe.
# - Runs on every push that touches print-app/ (so you get a fresh build to download).
# - Also runnable on demand (workflow_dispatch) and attaches to GitHub Releases.

on:
  push:
    paths:
      - "print-app/**"
      - ".github/workflows/build-print-app.yml"
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: print-app
        run: npm install

      - name: Build Windows installer + portable exe
        working-directory: print-app
        run: npm run dist
        env:
          # Skip code-signing; the app is unsigned (Windows SmartScreen will warn once).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VistaPrintStation-windows
          path: |
            print-app/dist/*.exe
          if-no-files-found: error

      # Publish a public, one-click download: a "latest" GitHub Release with the
      # .exe attached. Updated on every build so the link always serves the
      # newest app — no GitHub login or unzip needed to download it.
      - name: Publish latest release
        if: github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: print-station-latest
          name: Vista Print Station (latest)
          body: |
            The Vista Print Station desktop app for the PC connected to the Zebra printer.

            **Download `Vista.Print.Station.Setup.*.exe`** below and run it. On first launch,
            Windows SmartScreen may warn (the app is unsigned) — click **More info → Run anyway**.
            The portable `.exe` runs without installing if you prefer.
          make_latest: true
          files: print-app/dist/*.exe

      # Also attach to a real tagged release when one is published.
      - name: Attach to published release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: print-app/dist/*.exe
